body:
  text: 光紫色而年化為流星流星千年為浮水金入水不耗反益太清此飛仙之法勿酒二升與茯苓合絶穀仙方胡麻之法如一名三光之貴榮一名昌一名含映一名青襄是其葉食好成熟者搗持土穢隨意多少湯乾後蒸之使微氣出極溜通止更曝每至蒸時要須快日天陰不得復溫而復蒸都𭨃訖而後搗之和以白蜜至服時一服一枚以日三時服之可長生不死年十一月上亥日收槐子熟好者著黃服之百日上見天文二百初服一枚又十月上建收槐子三升枚一年夜二年萬病皆除服之三聰取章陸根三十斤去惡陰乾六十日末篩方寸七取寶立得不難日行千金不傳去三尸方恆以黃雌黃等分末之以綿裹死出去壽五百年活又以酒和取八月破除日和藥百病愈服三節耳目聰明同光上尸百日中尸六十日下雞子上尸黑中尸青下尸伺人罪過上奏天翁世間洇其藥力令人百病不愈五色若不去三尸但仙人與日月同光莫視凡下又方七月十七日去手爪足爪吞腹中去三尸又方取蕪荑五升乾柴四兩苟杞根四華水服日一食五日三尸蟲於下部中出防護之三日後自好不須防觀世音菩薩傍蟹八枚上好酒半升末和肉身日行萬里奔馬趁不及從經劫數已來不曾見之念説令人狐疑顛倒採黃精洗却惡皮毛細切一石水煮之至黃末和作餅日服如雞子不老聰明萬倍與天地相搗熟以水一石煮復內麻可丸如雞子大日服三丸十日已後服之百日萬病皆除三二間即升天矣洗生搗以生大豆黃末一升和合作餅如常以爐服一餅後日三餅漸自不飢至十日睡眠自然不須食一年已後升黃精二名重樓三名仙人餘糧天老日天地所生草有食之令名曰黃精餌而食之所以度世之入口即死人若信詬吻傷或乎其草精者葉似竹也夫採以二月八月三月禁忌食梅絶穀不飢大豆熬之以上六味各五合搗篩為末白蜜一斤可丸如李子大頓吞服之令人終不飢渴皆須天氣晴明先當清心齋戒香湯沐浴可合和仙藥又治三尸法取狼牙根乾服之一方寸七日三明蟲下得麻子二升大豆一升已上冬服麻子麻子亦炒和搗作末每日一抄服子若經一年日行千里五芝鳥茯苓半斤椒四兩錫半蜜二合令日三服食之三丸以日出時及午時申時年頭白更黑力徹虛空行千里王喬五斤水三石於釜口稍稍添水煮之可至一升品之又內白蜜一升重湯中更煎五升騰躍自在三萬佛同根本神祕之印并法我聞一時佛在他化自在天與諸大菩薩百超世間其名曰總持天菩薩虛空菩薩充明菩薩無量幢菩薩無量身菩薩金剛菩薩觀世音菩薩大鳴菩薩天親菩薩天津菩薩菩薩海眼菩薩文殊師利菩薩等有大菩薩摩訶薩有無量聲聞緣覺信男信女等繞佛百匝默然爾時莊嚴世龍種上尊王佛將三十二萬億呪提桓等類并諸眷屬前後圍繞諸散花香風吹林處處普遍光明照曜地六種震動巡諸國土來至自天上其諸二十八天及諸日月星辰並隱沒不現及此自在天上變為金色菩薩所威光並悉不爾時彼龍種上尊王佛到如來所無量問訊起面是時佛白言世尊我無量劫來修集方此欲崇大法願佛慈悲聲言善哉善哉汝能發心欲今速説我及十方諸大如來助汝宣化時上王佛復白有神印前佛後佛三萬餘人皆因此印得無上道究竟涅槃世尊若未得阿羅漢辟支佛等并下類凡夫初發心者若求諸大方術自在先當取盧耶娑木方一寸八分此云赤柳木是剋印持帶千靈並顯萬術自通龍種上尊王佛法第一先立壇三日一上廁一浴然後剋印含香水剋印呪曰毗耶提摩辟馱兜莎訶念龍種上尊王一切遍發願速求求求求世尊若有諸善男子善女人欲求無量百千萬術者即尅此印卑作囊盛之於膊上安之無得污淨隨所住坐臥百無妨礙常念我名南無龍種王佛每須念之龍種上尊王佛尅印法第一世尊當尅印之際默然除語尅之發願然後即受印當受印之日我及四衆諸呪於黃昏受之龍種上尊王佛帶印試效境相第一世尊若欲帶之略云其印多聖顯少效作是言已即臥若有上類利根凡夫於白頭邊即有三丸黑摩尼心寶藥若有下類凡夫即於中夜時有鐘鳴若凡夫即有異香來前若有利根即有此事若中根三日及有若得藥時勿令外人知覺便一氣吞之其人即與陀羅尼菩薩同位也若得是相已後至日滿乃可即試印術方爾試印效法第一世尊若當帶效力也欲試之時丁香七枚以印印之一下各㨶碎和水吞之須臾即得智若欲求他心智者亦取丁香二乾吞之即以印印口三下立得他心智預知三生之事又法取死人髑髏一枚無問以印之七下世間一切惡鬼並悉來降伏又法若欲求役使百千萬種神金剛等類取桑根皮一斤煮令爛去惡皮以印印之食次復之萬鬼並來降伏信息並亦預又法取清淨沙一升以印印之於四方之並悉得脫又法取井華水三升以印印之四方散一切枯潤益又法取黃沙三升以印印之埋於土中一日變成黃金又法取帶印人髮七枚以印印之擲在地中變成黑地又法帶印人取蛇以印印之各印一下其蛇印死取之第一癩及瘻無申等患以蛇少許與服差又法若印人求出世間者取水三煎取以同洗面及腳子時之間從地踊出百寶蓮花承印人求騰空者取水三升印之百遍洗自立即便騰身而去又發廣大心求萬法術者取椒一兩取水三升煎之以印印之三遍分作三分平旦時服一分午時服一分至夜間服一分悟相似然後即得通達萬法上知三十三天下知九十二億世界之苦衆生並悉能救之又法取乳頭香三兩以印印之七遍夜叉羅剎及諸惡鬼皆發善心奉事和上亦並歸依又法取牛蘇一斤練持白瓷碗盛無多少以印印之日服三兩服自厭此身為我被惡賊侵陵捨身他世得生佛前又法若取白石七枚以印印之擲在水中江神並來踊出及諸毒龍並皆自歸依又法取印成寶樓世尊其印前後有二萬億佛皆從是度若男子善女人但求得此印帶行日滿亦與佛又法但取印印隨意所須之處立即為灰印與餘死人身全者口中以印印之變成灰土又法取少又法取松樹以印印之立變成花樹又法取桃木六尺以印印將行意欲去處隨意世尊其印我自化身付囑前人又世尊此印若處世界恆被知唯有菩薩自在者即得之餘者見世尊若有持帶此印印人二十萬種福不可得而説之第一從無量世以來輪回六趣三業重障見此印便即除滅得清涼勝報第二無量劫來孝出佛身血殺阿羅僧誹謗三明大出長此印便永除斷無量重障得清淨恆在地獄餓鬼畜生邊無量百福莊嚴之身第四頭數若聞此印便得除斷無量第五從無量年來學種種法及諸方術一圓此印報第六從無量時來求緣定此印便得通達無邊智慧之門便成無上道法世尊其印覺者我當亦不取正覺自現不假遠覓又法取灰一升此世界至於他方又法取印印之服令世尊諸善男子但有緣者一人三人百人力持帶我領無量呪術大仙恆護哉善哉大士汝能有如是力不可思議此彼法及物十方諸大菩薩亦令得聞帶此印於五濁惡世而得清衆恆常術助呪乃作印帶之者過佛為上首皆從此印得度現在亦隨此印得大此印而得度得世尊但有諸善士等修此印住坐臥悉但留心令立即成就説此諸時俱從座起而白佛言今者若有諸善香一兩㨶作末以蜜和之燒以印印香法令得與我等生於一處令得度之無量大願悉仙而為上首及獨仙人所為菴阿婆仙而為上首及三明通神龍八部諸大鬼王及諸夜叉王獸王王鐵山王大鐵山王目真陀山王陀六欲天王並作是言世尊恆常術護悉不暫捨徒衆皆大歡喜一心修持各奉於佛四面高聲讚佛散花供養龍種上尊王佛消息萬神敕法凡欲作此印者萬鬼來集千神俱此印坐臥無量者即當憐目取定若得凡欲所作法先以大母指掐離傳目不得成又有外作法中上搯若作此法更不得成別喜並能作之若修印人意所坐處便印令
